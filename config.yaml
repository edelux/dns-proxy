---
docker:
  latest: true
  version: '{{VERSION}}'
  registry: docker.io
  filepath: docker
  filename: Dockerfile.debian
  platforms: linux/amd64,linux/arm64,linux/riscv64,linux/ppc64le,linux/s390x
  build_args:
    - BUILD_TARGETARCH: {{TARGETARCH}}
    - BUILD_VERSION: '{{VERSION}}'
    - BUILD_DATE: {{DATE}}
...
